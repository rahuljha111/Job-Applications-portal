spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${APP_MAIL_FROM}
app.name=${APP_NAME:Job Application Tracker}
app.verification.max-daily-requests=${VERIFICATION_MAX_DAILY:5}

spring.task.execution.pool.core-size=${TASK_CORE_SIZE:5}
spring.task.execution.pool.max-size=${TASK_MAX_SIZE:10}
spring.task.execution.pool.queue-capacity=${TASK_QUEUE_CAPACITY:100}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
file.upload-dir=${FILE_UPLOAD_DIR:/app/uploads}

ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.openrouter.model=${OPENROUTER_MODEL:gpt-3.5-turbo}
ai.openrouter.base-url=https://openrouter.ai/api/v1
ai.enabled=${AI_ENABLED:true}

rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.requests-per-minute=${RATE_LIMIT_RPM:60}
rate-limit.ai-requests-per-hour=${RATE_LIMIT_AI_RPH:20}
rate-limit.login-attempts-per-minute=${RATE_LIMIT_LOGIN_RPM:5}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

logging.level.root=INFO
logging.level.com.Jobtrackr.jta=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN