spring.application.name=jta
server.port=8081

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobportal1}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-chars}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:rahuljhaju@gmail.com}
spring.mail.password=${MAIL_PASSWORD:buckjzaalkmgayoi}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Verification Configuration
app.mail.from=${APP_MAIL_FROM:rahuljhaju@gmail.com}
app.name=${APP_NAME:Job Application Tracker}
app.verification.max-daily-requests=${VERIFICATION_MAX_DAILY:5}

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# AI Configuration
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=${OPENAI_MODEL:gpt-3.5-turbo}
ai.enabled=${AI_ENABLED:true}

# Rate Limiting
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.requests-per-minute=${RATE_LIMIT_RPM:60}
rate-limit.ai-requests-per-hour=${RATE_LIMIT_AI_RPH:20}
rate-limit.login-attempts-per-minute=${RATE_LIMIT_LOGIN_RPM:5}

# Logging
logging.level.com.Jobtrackr.jta=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=DEBUG
